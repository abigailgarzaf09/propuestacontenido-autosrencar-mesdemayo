<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Contenido — Autos Rencar Mayo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0e0e0e;
  --white: #f5f3ef;
  --accent: #d4420a;
  --accent2: #f0a500;
  --gray: #2a2a2a;
  --gray2: #3d3d3d;
  --muted: #888;
  --card-bg: #181818;
  --border: rgba(255,255,255,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}
a { color: inherit; }

/* HEADER */
.header {
  border-bottom: 1px solid var(--border);
  padding: 2.5rem 2.5rem 2rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}
.header-brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.header-eyebrow {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 6vw, 4.5rem);
  letter-spacing: 0.02em;
  line-height: 1;
  color: var(--white);
}
.header-title span { color: var(--accent); }
.header-meta {
  text-align: right;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.8;
}
.header-meta strong { color: var(--white); font-weight: 500; }

/* STATS BAR */
.stats {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.stat {
  flex: 1;
  min-width: 120px;
  padding: 1.25rem 1.5rem;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: var(--accent);
  line-height: 1;
}
.stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.08em; }

/* FILTERS */
.filters {
  padding: 1.25rem 2.5rem;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; }
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--white); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* MAIN */
.main { padding: 2rem 2.5rem; }

/* WEEK */
.week { margin-bottom: 3rem; }
.week-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
}
.week-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem;
  color: var(--gray2);
  line-height: 1;
  min-width: 60px;
}
.week-info { flex: 1; }
.week-dates { font-size: 13px; color: var(--muted); }
.week-desc { font-size: 11px; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; margin-top: 2px; }
.week-line { flex: 1; height: 1px; background: var(--border); }

/* CARDS GRID */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
.card {
  background: var(--card-bg);
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.card.humor::before { background: var(--accent2); }
.card.emotion::before { background: #e05080; }
.card.showcase::before { background: #2a8fff; }
.card.engagement::before { background: #1dbf7a; }
.card.edu::before { background: #9b6fff; }
.card:hover { background: #222; }

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-day { font-size: 11px; color: var(--muted); font-weight: 500; }
.plats { display: flex; gap: 4px; }
.plt {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.plt-ig { background: rgba(212,66,10,0.15); color: #ff7a55; border: 1px solid rgba(212,66,10,0.3); }
.plt-tt { background: rgba(42,143,255,0.12); color: #6db8ff; border: 1px solid rgba(42,143,255,0.25); }
.plt-fb { background: rgba(29,191,122,0.12); color: #4de0a0; border: 1px solid rgba(29,191,122,0.25); }

.card-format {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.card.humor .card-format { color: var(--accent2); }
.card.emotion .card-format { color: #e05080; }
.card.showcase .card-format { color: #2a8fff; }
.card.engagement .card-format { color: #1dbf7a; }
.card.edu .card-format { color: #9b6fff; }

.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--white);
  line-height: 1.4;
}
.card-hook {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  font-style: italic;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.card-obj {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.obj-engagement { background: rgba(29,191,122,0.12); color: #4de0a0; }
.obj-reach { background: rgba(155,111,255,0.12); color: #b899ff; }
.obj-trust { background: rgba(240,165,0,0.12); color: #f5c842; }
.obj-sales { background: rgba(212,66,10,0.12); color: #ff7a55; }

.card-links { display: flex; gap: 6px; align-items: center; }
.inspo-link {
  font-size: 10px;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.inspo-link:hover { border-color: var(--accent); color: var(--accent); }
.script-btn {
  font-size: 10px;
  color: var(--muted);
  background: transparent;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.script-btn:hover { border-color: var(--white); color: var(--white); }

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.overlay.open { display: flex; }
.modal {
  background: #181818;
  border: 1px solid var(--border);
  border-radius: 4px;
  max-width: 560px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 2rem;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1.25rem;
  gap: 1rem;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.04em;
  line-height: 1.2;
  color: var(--white);
}
.modal-close {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
}
.modal-close:hover { color: var(--white); }
.modal-body {
  font-size: 13px;
  color: #aaa;
  line-height: 1.8;
  white-space: pre-wrap;
}
.modal-body strong { color: var(--white); font-weight: 500; }
.modal-inspo {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-inspo-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.modal-inspo a {
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid rgba(212,66,10,0.3);
  padding: 3px 10px;
  border-radius: 20px;
  transition: all 0.15s;
}
.modal-inspo a:hover { background: rgba(212,66,10,0.12); }

/* FOOTER */
.footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}
.footer-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.05em;
  color: var(--muted);
}
.footer-brand span { color: var(--accent); }
.footer-note { font-size: 11px; color: var(--gray2); }

/* HIDDEN */
.hidden { display: none !important; }

@media (max-width: 640px) {
  .header, .main, .filters, .footer { padding-left: 1.25rem; padding-right: 1.25rem; }
  .cards { grid-template-columns: 1fr; }
  .header-title { font-size: 2.5rem; }
  .stats { flex-wrap: wrap; }
  .stat { min-width: 50%; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-eyebrow">Calendario de contenido</div>
    <div class="header-title">Autos <span>Rencar</span></div>
  </div>
  <div class="header-meta">

const weekLabels = {
  1: { dates:"15 · 19 · 21 May", theme:"Arranque fuerte — emoción + viralidad" },
  2: { dates:"26 · 28 · 30 May", theme:"Familias + humor + engagement" },
  3: { dates:"2 · 4 · 6 Jun",   theme:"Pareja + camionetas + aspiracional" },
  4: { dates:"9 · 11 · 13 Jun", theme:"Eléctrico + humor + showroom" }
};

let activeFilter = "all";

function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const filtered = activeFilter === "all" ? reels : reels.filter(r => r.formatKey === activeFilter);
  const byWeek = {};
  filtered.forEach(r => { if (!byWeek[r.week]) byWeek[r.week] = []; byWeek[r.week].push(r); });

  Object.keys(byWeek).sort().forEach(w => {
    const wl = weekLabels[w];
    const section = document.createElement("div");
    section.className = "week";
    section.innerHTML = `
      <div class="week-header">
        <div class="week-num">0${w}</div>
        <div class="week-info">
          <div class="week-dates">${wl.dates}</div>
          <div class="week-desc">${wl.theme}</div>
        </div>
        <div class="week-line"></div>
      </div>
      <div class="cards" id="wk${w}"></div>
    `;
    main.appendChild(section);
    const grid = section.querySelector(`#wk${w}`);
    byWeek[w].forEach(r => {
      const card = document.createElement("div");
      card.className = `card ${r.formatKey}`;
      const plats = r.platforms.map(p => `<span class="plt plt-${p}">${p.toUpperCase()}</span>`).join("");
      const inspoBtn = r.inspo
        ? `<a class="inspo-link" href="${r.inspo}" target="_blank">↗ Inspo</a>`
        : `<span style="font-size:10px;color:#444">Sin inspo</span>`;
      card.innerHTML = `
        <div class="card-top">
          <span class="card-day">${r.day}</span>
          <div class="plats">${plats}</div>
        </div>
        <div class="card-format">${r.format}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-hook">${r.hook}</div>
        <div class="card-footer">
          <span class="card-obj obj-${r.objKey}">${r.obj}</span>
          <div class="card-links">
            ${inspoBtn}
            <button class="script-btn" onclick="openModal(${reels.indexOf(r)})">Script</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function openModal(idx) {
  const r = reels[idx];
  document.getElementById("modal-title").textContent = r.title;
  document.getElementById("modal-body").textContent = r.script;
  const inspoEl = document.getElementById("modal-inspo");
  if (r.inspo) {
    inspoEl.innerHTML = `<span class="modal-inspo-label">Referencia:</span><a href="${r.inspo}" target="_blank">Ver reel de inspo ↗</a>`;
    inspoEl.style.display = "flex";
  } else {
    inspoEl.style.display = "none";
  }
  document.getElementById("overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

document.getElementById("overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b === btn));
    render();
  });
});

render();
</script>
